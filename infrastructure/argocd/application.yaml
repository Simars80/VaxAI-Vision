---
# ArgoCD Application — staging
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vaxai-backend-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: vaxai
  source:
    repoURL: https://github.com/Simars80/VaxAI-Vision.git
    targetRevision: main
    path: helm/vaxai-backend
    helm:
      valueFiles:
        - values.yaml
        - values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: vaxai-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 5
---
# ArgoCD Application — production
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vaxai-backend-production
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: vaxai
  source:
    repoURL: https://github.com/Simars80/VaxAI-Vision.git
    targetRevision: HEAD   # pinned to git tags via CI
    path: helm/vaxai-backend
    helm:
      valueFiles:
        - values.yaml
        - values-production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: vaxai-production
  syncPolicy:
    automated:
      prune: false          # require manual approval for prod deletions
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 2
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  revisionHistoryLimit: 10
