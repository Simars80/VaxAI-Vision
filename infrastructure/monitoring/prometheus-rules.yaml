apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: vaxai-backend-alerts
  namespace: monitoring
  labels:
    app: vaxai-backend
    prometheus: kube-prometheus
spec:
  groups:
    - name: vaxai.api
      interval: 30s
      rules:
        # ── P0: API completely down ────────────────────────────────────────────
        - alert: VaxAIAPIDown
          expr: |
            absent(up{job="vaxai-backend-api"} == 1)
          for: 2m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "VaxAI API is down"
            description: "No healthy VaxAI API pods have been detected for 2 minutes."
            runbook: "https://runbooks.vaxai.health/api-down"

        # ── P0: High error rate ────────────────────────────────────────────────
        - alert: VaxAIHighErrorRate
          expr: |
            (
              sum(rate(http_request_duration_seconds_count{job="vaxai-backend-api", status=~"5.."}[5m]))
              /
              sum(rate(http_request_duration_seconds_count{job="vaxai-backend-api"}[5m]))
            ) > 0.05
          for: 5m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "VaxAI API error rate > 5%"
            description: "5xx error rate is {{ humanizePercentage $value }} for the past 5 minutes."

        # ── P1: High latency ───────────────────────────────────────────────────
        - alert: VaxAIHighLatencyP99
          expr: |
            histogram_quantile(
              0.99,
              sum(rate(http_request_duration_seconds_bucket{job="vaxai-backend-api"}[5m])) by (le)
            ) > 2.0
          for: 10m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "VaxAI API P99 latency > 2s"
            description: "P99 latency is {{ $value | humanizeDuration }} over the last 10 minutes."

    - name: vaxai.ingestion
      interval: 60s
      rules:
        # ── P1: Celery queue backing up ────────────────────────────────────────
        - alert: VaxAIIngestionQueueBacklog
          expr: |
            celery_queue_length{queue="ingestion"} > 100
          for: 15m
          labels:
            severity: warning
            team: data
          annotations:
            summary: "Ingestion queue has > 100 tasks backlogged"
            description: "Queue length is {{ $value }}. Workers may be stuck or undersized."

        # ── P1: Failed ingestion jobs ──────────────────────────────────────────
        - alert: VaxAIIngestionJobFailureRate
          expr: |
            (
              increase(vaxai_ingestion_jobs_total{status="failed"}[1h])
              /
              increase(vaxai_ingestion_jobs_total[1h])
            ) > 0.1
          for: 5m
          labels:
            severity: warning
            team: data
          annotations:
            summary: "Ingestion failure rate > 10%"

    - name: vaxai.ml
      interval: 300s
      rules:
        # ── P2: Model training stuck ───────────────────────────────────────────
        - alert: VaxAIMLTrainingStuck
          expr: |
            (time() - vaxai_model_run_started_timestamp) > 3600
            and on(model_run_id) vaxai_model_run_status{status="running"} == 1
          for: 5m
          labels:
            severity: warning
            team: ml
          annotations:
            summary: "ML training run has been running for > 1 hour"
