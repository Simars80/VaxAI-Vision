# Flyway configuration for VaxAI Vision
# Override sensitive values via environment variables or a local flyway.local.conf (gitignored)

flyway.url=jdbc:postgresql://localhost:5432/vaxai_vision
flyway.user=vaxai
flyway.password=${FLYWAY_PASSWORD:-vaxai_dev_password}

flyway.schemas=public
flyway.locations=filesystem:./
flyway.baselineOnMigrate=true
flyway.validateOnMigrate=true
flyway.outOfOrder=false

# Naming convention: V{version}__{description}.sql
# e.g. V001__initial_schema.sql, V002__add_users_table.sql
