name: Deploy

on:
  push:
    branches: [main]      # → staging / continuous deploy
    tags:
      - "v*"              # → production release

env:
  ECR_REGISTRY: 402079573320.dkr.ecr.us-east-2.amazonaws.com
  ECR_REPOSITORY: vaxai-backend

jobs:
  # ── Build & push Docker image to ECR ─────────────────────────────────────────
  build-and-push:
    name: Build & push to ECR
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push image to ECR
        id: build
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:${IMAGE_TAG} \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --build-arg VITE_API_URL=https://api.vaxaivision.com/api/v1 \
            ./backend
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:${IMAGE_TAG}" >> $GITHUB_OUTPUT

  # ── Deploy to ECS Express Mode ────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    # Skipped until ECS_CLUSTER and ECS_SERVICE variables are set in GitHub
    if: vars.AWS_REGION != '' && vars.ECS_CLUSTER != ''
    environment:
      name: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}
      url: https://api.vaxaivision.com/docs

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --service ${{ vars.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ vars.AWS_REGION }}

      - name: Wait for ECS service to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --services ${{ vars.ECS_SERVICE }} \
            --region ${{ vars.AWS_REGION }}

      - name: Smoke test
        run: |
          sleep 15
          curl -sf "https://api.vaxaivision.com/health" || echo "Smoke test skipped (DNS not ready)"
