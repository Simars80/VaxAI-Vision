version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vaxai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vaxai
      POSTGRES_PASSWORD: vaxai_dev_password
      POSTGRES_DB: vaxai_vision
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaxai -d vaxai_vision"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vaxai_redis
    restart: unless-stopped
    command: redis-server --requirepass vaxai_redis_dev --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "vaxai_redis_dev", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── LocalStack (S3 emulation for dev) ───────────────────────────────────────
  localstack:
    image: localstack/localstack:3
    container_name: vaxai_localstack
    restart: unless-stopped
    environment:
      - SERVICES=s3,iam
      - DEFAULT_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - LOCALSTACK_HOST=localstack
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ../scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh

  # ─── Adminer (DB UI for dev) ──────────────────────────────────────────────────
  adminer:
    image: adminer:4
    container_name: vaxai_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  localstack_data:

networks:
  default:
    name: vaxai_network
