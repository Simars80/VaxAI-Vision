# Prometheus scrape configuration for VaxAI Vision
# Used in local dev (docker-compose) and as the base config in EKS
# (the Helm chart overrides the scrape interval and remote_write settings).

global:
  scrape_interval: 15s        # How frequently to scrape targets
  evaluation_interval: 15s    # How frequently to evaluate alerting rules
  scrape_timeout: 10s

  # Attach these labels to every time series scraped from this Prometheus
  external_labels:
    cluster: "local-dev"
    environment: "development"
    app: "vaxai-vision"

# ── Alerting ──────────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

# ── Alerting rules ────────────────────────────────────────────────────────────
rule_files:
  - "/etc/prometheus/alerting-rules.yml"

# ── Scrape targets ────────────────────────────────────────────────────────────
scrape_configs:

  # ── VaxAI Vision Backend API ────────────────────────────────────────────────
  - job_name: "vaxai-backend-api"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "backend:8000"
        labels:
          service: "backend-api"
          component: "fastapi"
    # Relabelling: keep only the normalised path for cardinality control
    metric_relabel_configs:
      - source_labels: [__name__]
        action: keep
        regex: "vaxai_.*|process_.*|python_.*"

  # ── Prometheus self-monitoring ───────────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"

  # ── Node/container metrics (cAdvisor) ───────────────────────────────────────
  # Uncomment when cAdvisor is added to the compose stack
  # - job_name: "cadvisor"
  #   static_configs:
  #     - targets:
  #         - "cadvisor:8080"

  # ── PostgreSQL exporter ──────────────────────────────────────────────────────
  # Uncomment when postgres_exporter is added to the compose stack
  # - job_name: "postgres"
  #   static_configs:
  #     - targets:
  #         - "postgres-exporter:9187"

  # ── Redis exporter ───────────────────────────────────────────────────────────
  # Uncomment when redis_exporter is added to the compose stack
  # - job_name: "redis"
  #   static_configs:
  #     - targets:
  #         - "redis-exporter:9121"
