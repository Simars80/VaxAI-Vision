server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — serve index.html for all unknown routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend service.
    # VAXAI_BACKEND_URL is substituted at container start via envsubst.
    # Default: http://vaxai-backend:8000 (K8s/ECS service discovery).
    # Override: docker run -e VAXAI_BACKEND_URL=https://api.vaxaivision.com ...
    location /api/ {
        proxy_pass ${VAXAI_BACKEND_URL}/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
