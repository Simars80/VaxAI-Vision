version: "3.9"
services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: vaxai
      POSTGRES_PASSWORD: ${DB_PASSWORD:-VaxAI_Prod_2026!}
      POSTGRES_DB: vaxai_vision
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaxai -d vaxai_vision"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-VaxAI_Redis_2026!}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-VaxAI_Redis_2026!}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    restart: always
    ports:
      - "80:8000"
    environment:
      ENV: production
      DATABASE_URL: postgresql+asyncpg://vaxai:${DB_PASSWORD:-VaxAI_Prod_2026!}@db:5432/vaxai_vision
      REDIS_URL: redis://:${REDIS_PASSWORD:-VaxAI_Redis_2026!}@redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET:-VaxAI_JWT_Secret_2026_Production}
      ALLOWED_ORIGINS: '["https://vaxaivision.com","https://www.vaxaivision.com","https://app.vaxaivision.com","https://api.vaxaivision.com"]'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-ingestion:
    build: .
    restart: always
    command: celery -A app.workers.celery_app worker -Q ingestion -c 2 --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://vaxai:${DB_PASSWORD:-VaxAI_Prod_2026!}@db:5432/vaxai_vision
      REDIS_URL: redis://:${REDIS_PASSWORD:-VaxAI_Redis_2026!}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-ml:
    build: .
    restart: always
    command: celery -A app.workers.celery_app worker -Q ml_training -c 1 --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://vaxai:${DB_PASSWORD:-VaxAI_Prod_2026!}@db:5432/vaxai_vision
      REDIS_URL: redis://:${REDIS_PASSWORD:-VaxAI_Redis_2026!}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
