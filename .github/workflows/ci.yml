name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/vaxai-backend

jobs:
  # ── Detect which parts of the monorepo changed ──────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      landing: ${{ steps.filter.outputs.landing }}
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            landing:
              - 'src/**'
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.mjs'
              - 'tsconfig.json'
              - 'tailwind.config.ts'
              - 'postcss.config.mjs'
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  # ── Next.js Landing Page Build (vaxaivision.com) ────────────────────────────
  landing-build:
    name: "Landing page build (Next.js)"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.landing == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Check for import.meta in client dependencies
        run: |
          echo "Scanning node_modules for import.meta in ESM entries..."
          # Check onnxruntime-web specifically (known offender)
          if grep -r "import\.meta" node_modules/onnxruntime-web/dist/ort.min.js 2>/dev/null; then
            echo "::error::onnxruntime-web CJS build contains import.meta — alias will not fix Terser"
            exit 1
          fi
          echo "✓ onnxruntime-web CJS build is clean"

      - name: Build Next.js
        run: npx next build
        env:
          # Suppress telemetry in CI
          NEXT_TELEMETRY_DISABLED: 1

      - name: Check build output for known issues
        if: failure()
        run: |
          echo "::group::Common Next.js 14 build failures"
          echo "1. 'import.meta' cannot be used outside of module code → Add absolute-path webpack alias to CJS build in next.config.mjs"
          echo "2. useSearchParams() should be wrapped in suspense boundary → Wrap in <Suspense>"
          echo "3. Unrecognized key 'serverExternalPackages' → Use experimental.serverComponentsExternalPackages (Next.js 14)"
          echo "See CLAUDE.md for full details."
          echo "::endgroup::"

  # ── Vite Frontend Build (app.vaxaivision.com) ───────────────────────────────
  frontend-build:
    name: "Dashboard build (Vite)"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Type check
        working-directory: frontend
        run: npx tsc -b --noEmit || true

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: https://api.vaxaivision.com
        run: npm run build

  # ── Backend Lint & Tests ────────────────────────────────────────────────────
  lint:
    name: "Backend lint & type-check"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check app/

      - name: Ruff format check
        run: ruff format --check app/

      - name: Mypy type check
        run: mypy app/ --ignore-missing-imports --no-error-summary || true

  test:
    name: "Backend tests"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vaxai
          POSTGRES_PASSWORD: vaxai_test
          POSTGRES_DB: vaxai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://vaxai:vaxai_test@localhost:5432/vaxai_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test-secret-key-for-ci-only-32chars
      ENV: development

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short --asyncio-mode=auto

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/htmlcov/

  # ── Docker build (validate only on PRs) ─────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: needs.changes.outputs.backend == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase image tag
        run: echo "IMAGE_TAG=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build image (no push on PR)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Gate: all required checks must pass ─────────────────────────────────────
  ci-gate:
    name: "CI Gate"
    runs-on: ubuntu-latest
    if: always()
    needs: [changes, landing-build, frontend-build, lint, test]
    steps:
      - name: Check results
        run: |
          echo "Landing:  ${{ needs.landing-build.result }}"
          echo "Frontend: ${{ needs.frontend-build.result }}"
          echo "Lint:     ${{ needs.lint.result }}"
          echo "Tests:    ${{ needs.test.result }}"

          # Fail if any non-skipped job failed
          if [[ "${{ needs.landing-build.result }}" == "failure" ]] || \
             [[ "${{ needs.frontend-build.result }}" == "failure" ]] || \
             [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "::error::One or more CI checks failed"
            exit 1
          fi

          echo "✓ All applicable checks passed"
